appId: com.xiabanya.app
productName: 下班鸭
electronDist: node_modules/electron/dist
directories:
  output: release
win:
  target: nsis
  icon: src/renderer/assets/xiabanya-logo.ico
nsis:
  artifactName: Setup.${version}.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  multiLanguageInstaller: true
  installerLanguages:
    - zh_CN
    - en_US
  displayLanguageSelector: true
  include: build/installer.nsh
npmRebuild: false
files:
  - dist/**/*
  - package.json
extraResources:
  - from: src/renderer/assets/xiabanya-logo.ico
    to: assets/xiabanya-logo.ico
  - from: assets/xiabanya-mascot.png
    to: assets/xiabanya-mascot.png
  - from: assets/desk-pet
    to: assets/desk-pet
