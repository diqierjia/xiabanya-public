<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    .bubble {
      position: absolute;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      width: fit-content;
      max-width: calc(100% - 12px);
      min-height: 0;
      padding: 6px 10px;
      border: 1px solid rgba(240, 207, 99, 0.5);
      border-radius: 16px;
      background: rgba(255, 251, 235, 0.97);
      color: #263238;
      box-shadow: 0 8px 24px rgba(38, 50, 56, 0.12);
      font-size: 14px;
      line-height: 1.5;
      font-family: Inter, "Microsoft YaHei", system-ui, sans-serif;
      white-space: pre-wrap;
      word-break: break-word;
      cursor: pointer;
      opacity: 0;
      transition: opacity 160ms ease, transform 160ms ease;
      -webkit-app-region: no-drag;
      backdrop-filter: blur(8px);
    }

    .bubble.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="bubble" aria-live="polite"></div>
  <script>
    const bubble = document.querySelector('.bubble');
    const hostWindow = window.xiabanyaApi && window.xiabanyaApi.deskPetWindow;

    window.showProactiveBubble = (message) => {
      const content = String(message?.content ?? '').trim();
      if (!content) return;

      const parts = content
        .split(/(?:\n\s*\n+|[ \t\u00a0\u3000]{2,})/)
        .map(p => p.trim())
        .filter(Boolean);

      bubble.innerHTML = '';

      if (parts.length === 1) {
        bubble.textContent = parts[0];
      } else {
        parts.forEach((part, i) => {
          const p = document.createElement('p');
          p.textContent = part;
          p.style.margin = i === 0 ? '0 0 3px 0' : i === parts.length - 1 ? '3px 0 0 0' : '3px 0';
          bubble.appendChild(p);
        });
      }

      bubble.classList.add('visible');

      // Notify main process of actual bubble content height for adaptive resizing
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (!hostWindow || !hostWindow.notifyBubbleContentHeight) return;
          // Total window height = bubble bounding rect height + bottom offset (8px)
          const bubbleRect = bubble.getBoundingClientRect();
          const totalHeight = Math.ceil(bubbleRect.height + 8);
          hostWindow.notifyBubbleContentHeight(totalHeight);
        });
      });
    };

    bubble.addEventListener('click', () => {
      if (hostWindow && hostWindow.toggleChat) {
        hostWindow.toggleChat();
      }
    });
  </script>
</body>
</html>
